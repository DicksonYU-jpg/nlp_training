model: Qwen3-0.6B
dataset: Dicksonycx/MetaMath-ReGenerateThink

wandb_args:
  project: "qwen_math_ablation"
  name: "regen_think"

lora_args:
  r: 64
  lora_alpha: 64
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj",
                   "gate_proj", "up_proj", "down_proj"]

sft_args:
  report_to: "wandb"
  output_dir: "./checkpoints/sft_regen_think_checkpoints"

  # train
  batch_size: 32
  max_length: 2048
  learning_rate: 2e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 2
  assistant_only_loss: true

  # optimization
use_liger_kernel: true
  bf16: true
  packing: true
  padding_free: true

  # eval
  eval_strategy: "steps"
  eval_steps: 30
  per_device_eval_batch_size: 32
  load_best_model_at_end: true

  # save
  save_strategy: "steps"
  save_steps: 30
  save_total_limit: 20